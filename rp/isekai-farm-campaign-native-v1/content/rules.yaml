rules:
- id: rule:ai-gm-turn-loop
  name: AI GM 回合闭环
  category: gm
  scope: play
  statement: 每次游玩必须区分查询、行动预览、delta 校验和保存提交。查询只召回事实与可选行动，不推进时间；行动预览必须列出相关事实、时间成本、风险、可保存变化和不确定点；只有通过校验并提交的 delta 才能改变存档事实。GM
    不能把未保存的叙事描述当作后续权威事实。
  examples:
  - 玩家问“现在基地怎么样”时只回答状态和可选维护，不自动推进一天。
  - 玩家说“去湖边聚落接触”时先预览路线、警惕钟、携带物和失败后果，再保存实际结果。
  - AI 临场写了一个未提交的异常线索，下一回合不能直接当作已经发现的事实。
  exceptions:
  - 纯 UI 或格式化输出不需要生成 delta。
  - 用户明确要求重写设定时，应作为维护 delta 或剧情包修改处理，不混入普通行动回合。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - AI GM 主循环
  - 回合闭环
  - 查询预览保存
- id: rule:artifact-grow-only
  name: 万能农具只能种出植物
  category: artifact
  scope: world
  statement: 万能农具只能生成从土地自然生长的植物或植物自然产物，不能直接生成加工品、金属、动物、水或成品工具。
  examples:
  - 能生成竹子、树木、作物、藤条、毒树。
  - 不能生成面包、烤肉、金属刀、水、动物。
  source: archive_v1/setting.md
  locked: true
  aliases:
  - 万能农具规则
  - 农具限制
- id: rule:artifact-plant-knowledge
  name: 万能农具种植认知边界
  category: artifact
  scope: world
  statement: 万能农具只能加速或唤出“自然界可成立的植物或植物自然产物”，且必须有足够认知锚点：主角现实知识、已见过样本、已确认线索、NPC描述或素材库合法候选。未知高阶魔力植物不能凭名字直接生成；未确认素材只能先作为幼株、低收益样本、异常线索或失败/偏差结果出现。
  examples:
  - 土豆、竹子、普通树木可凭现实认知种出。
  - 见血封喉、渊刺藤、月蛛藤等高风险/高收益植物需要样本、线索或已确认记录支撑。
  - 玩家想种“最强神树”时，GM应要求明确样本或降级为未知异常线索，不能直接给成品资源。
  exceptions:
  - 已经在存档中确认过的植物可按其已知规则再次尝试。
  - 低收益、无战略影响的普通植物可宽松处理，但仍受水、土壤和季节影响。
  source: system/world_rules
  locked: true
  aliases:
  - 农具认知边界
  - 种植样本规则
  - 魔力植物生成限制
- id: rule:base-upkeep-loop
  name: 基地维护循环
  category: base
  scope: base
  statement: 基地经营按“产出、消耗、维护、暴露”四项循环处理。农田、储水、仓储、厨房、发酵、危险品、陷阱、菌丝通道和居住舒适度都可能在多日忽略后产生压力。维护结果应优先表现为小问题、效率下降或待处理任务，而不是突然毁灭。
  examples:
  - 扩田后若多日不处理水和堆肥，推进干旱或土壤肥力压力。
  - 火药、毒箭和食物混放会生成安全维护问题。
  - 菌丝城扩张时要记录养分、水分、通道维护和暴露痕迹。
  exceptions:
  - 一两天内低风险日常维护可以由夏娃和例行流程简化。
  - 玩家明确安排自动化分工后，可降低维护频率，但仍需周期性检查瓶颈。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - 仓储安全
  - 农家循环
  - 后勤压力规则
  - 基地维护规则
- id: rule:clue-triangulation
  name: 线索三角确认
  category: clue
  scope: play
  statement: 对外部文明、遗迹、未知生物、神祇干预和高价值资源等重大事实，GM 应使用多线索确认：单个痕迹只能形成假说，两个独立线索可以定位调查方向，三个或更多相互支持的线索才适合保存为高置信事实。线索必须指向可行动节点，而不是只增加神秘感。
  examples:
  - 叠石、工具凿痕和新鲜营火共同出现后，才适合确认有近期外部人活动。
  - 一种魔力植物的传闻、样本和实验记录共同存在后，才能稳定进入制作体系。
  - 遗迹传说、异常材料和地图标记应导向具体可调查地点。
  exceptions:
  - 低风险日常事实可以由直接观察确认。
  - 玩家已亲眼见到、接触并保存的事实不需要重复三次确认。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - 三线索规则
  - 线索链
  - 证据推进
  - 谜团确认
- id: rule:consequence-ladder
  name: 后果阶梯
  category: risk
  scope: play
  statement: 风险结算优先使用分级后果：提示、轻微代价、资源损耗、进度钟推进、局部伤害、长期问题、危机爆发。除非玩家明确选择极高风险或已满足满钟条件，GM 不应从一次普通失败直接跳到不可逆灾难。
  examples:
  - 潮湿导致火药失效通常先是性能下降，不是立刻爆炸。
  - 湖边聚落误会可先表现为后撤、警惕或拒绝交易，而不是直接开战。
  - 入夜迷路可先消耗时间、疲劳和标记路线，而不是直接丢失角色。
  exceptions:
  - 玩家无防护处理爆炸物、剧毒或致命敌人时，可以直接产生严重后果。
  - 已明确预警且玩家继续推进的高危行动，应按选择承担结果。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - 危机升级
  - 失败阶梯
  - 软后果
  - 风险后果
- id: rule:craft-experiment-ladder
  name: 制作实验阶梯
  category: craft
  scope: play
  statement: 新工艺按“想法、材料确认、原型、测试、稳定配方、批量生产”推进。AI 可以帮助提出合理方案，但不能跳过材料限制、工具能力、失败风险和测试记录。高风险制作必须先小样试验，再进入实战或批量。
  examples:
  - 火药箭先做引信小样和安全测试，再保存为可靠配方。
  - 愈疮木箭杆已可作为稳定材料，但新箭头组合仍需试射。
  - 终极复合弩这类高阶项目应拆成弩身、弩臂、轨道、弦材和安全测试。
  exceptions:
  - 已经有 recipe 实体且材料齐备的低风险重复制作可简化。
  - 临时粗制工具可以跳过稳定配方，但可靠性较低。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - 制作实验
  - 小样测试
  - 工艺阶梯
  - 稳定配方
- id: rule:divine-manifestation-limits
  name: 神祇现实显现边界
  category: divinity
  scope: world
  statement: 神祇客观存在，但不能无条件直接降临现实、稳定化身或替凡人解决冲突。明确的现实显现必须满足苛刻且可追踪的条件，例如与神职领域相符的地点/时机、长期信仰或契约锚点、足够媒介与代价，并产生持续后果。神术、异象、预兆和巧合不能自动等同于神祇亲自显现。
  examples:
  - 普通祈祷可以影响人物选择或产生无法证实的回应，但不能直接召来神祇处理日常困难。
  - 剧情级神迹需要多轮铺垫、条件和代价，并留下势力、生态或世界状态变化。
  - 不同文化可以对同一异象有不同解释，GM不能在证据不足时替玩家宣布唯一神学答案。
  exceptions:
  - 仅作为象征、梦境或宗教叙事出现时，不等于现实显现。
  - 用户明确修改设定或开启神祇显现篇章时，仍需用结构化事件记录条件与后果。
  source: user_confirmation_2026-06-29
  locked: true
  aliases:
  - 神明降临
  - 神的限制
  - 神祇显现
  - 神迹边界
- id: rule:exploration-pressure-roll
  name: 探索压力裁决
  category: exploration
  scope: play
  statement: 旅行、探索、搜索和采集不是纯叙事跳转。每次有时间成本或危险区域行动时，GM 应至少考虑一种压力结果：遭遇、线索、地点变化、疲劳、资源消耗、时间流逝或环境暴露。压力结果可以轻微，但必须与地点、天气、时段、路线和当前进度钟一致。
  examples:
  - 谨慎探索老树林可能只得到脚印、气味或旧痕迹，不必每次遭遇魔物。
  - 入夜远行即使成功抵达，也可能增加疲劳或错过基地维护。
  - 玩家带火药穿越潮湿区域时，应检查防潮、误触发和气味暴露。
  exceptions:
  - 已经完全安全且反复走熟的短距离基地内部移动可以简化。
  - 查询地图、查看已知路线不触发探索压力。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - 探索压力
  - 探索骰
  - 搜索压力
  - 旅行风险
- id: rule:external-trace-classification
  name: 外部文明痕迹分级
  category: faction
  scope: world
  statement: 非灰藓族工具痕、叠石、布片、切削痕、远烟等外部文明相关信息必须按“旧痕迹、近期活动、持续观察、正式接触”分级。当前只有痕迹时，不能直接宣布外部人类势力登场、定位基地或建立外交；外部文明真正介入必须由文明传闻钟、连续线索、玩家追踪或明确事件共同支撑。
  examples:
  - L15的非灰藓族工具痕迹只能说明存在未确认制造者或旧活动，不能直接说人类侦查者已到家门口。
  - 文明传闻钟未推进到阈值前，外部人类最多作为远期伏笔或不可用线索。
  - 玩家连续追踪、发现新营火并确认工具来源后，才能保存为新势力/角色/路线事实。
  exceptions:
  - 灰藓族相关痕迹走灰藓族社交和聚落警惕规则，不自动归入外部人类文明。
  - 玩家明确要求改设定或开启外部文明篇章时，可用内容 delta 或剧情事件重设解锁条件。
  source: system/world_rules
  locked: true
  aliases:
  - 叠石线索分级
  - 外部文明线索
  - 文明传闻
  - 非灰藓族工具痕迹
- id: rule:faction-contact-stance
  name: 势力接触姿态
  category: faction
  scope: play
  statement: 势力接触必须区分个体、家庭、聚落、族群和外部文明。接触前检查玩家姿态、携带物、武装程度、礼物、过往承诺、地点禁忌和对方当前压力。一次友好互动不能自动代表整个势力信任；一次误会也不必直接变成永久敌对。
  examples:
  - An 的信任可以帮助介绍灰藓族知识，但不能直接替湖边聚落背书。
  - 武装接近棚屋会推进警惕；放下武器、留交换物和保持距离可以降低风险。
  - 外部人类出现前应先经过痕迹、传闻和观察节点。
  exceptions:
  - 已经建立稳定同伴关系的个体日常交流可简化。
  - 用户明确选择强硬威胁时，应正常结算势力后果。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - 低压接触
  - 势力接触
  - 社交姿态
  - 聚落警惕
- id: rule:fatigue-rest-loop
  name: 疲劳与休息节奏
  category: survival
  scope: player
  statement: 连续高强度制作、远行、入夜行动、负重、受伤、情绪压力和低质量睡眠会累积疲劳。疲劳不应频繁打断悠闲节奏，但会降低精细制作、追踪、战斗反应和社交耐心。充足睡眠、食物、水、舒适住所和安全感可以降低疲劳。
  examples:
  - 连续赶路到入夜后再做火药实验，应增加失误风险或建议休息。
  - 休息一晚可以恢复金光，并降低疲劳压力。
  - 在危险地点浅睡只能部分恢复，且可能留下警戒成本。
  exceptions:
  - 轻松闲聊、查询、室内短时整理不推进疲劳。
  - 剧情级危机可让角色短期硬撑，但必须留下后续代价。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - 休息节奏
  - 生存节奏
  - 疲劳裁决规则
  - 睡眠质量
- id: rule:gather-yield-pressure
  name: 采集产出与再生压力
  category: gather
  scope: play
  statement: 采集行动必须同时说明产出、时间、工具需求、地点压力和再生/枯竭边界。常见资源可低成本获取；稀有资源、魔力植物、动物产物和矿物资源需要确认位置、采集方法和生态后果。重复采集同一点应降低收益或推进压力。
  examples:
  - 溪边藤条可少量获取，但大量采集会消耗时间并留下痕迹。
  - 硫磺、硝石和毒木采集必须检查容器、防护和污染。
  - 鱼笼收获要结算天气、水位、放置时间和诱饵状态。
  exceptions:
  - 基地内已稳定种植的普通作物按农田状态处理。
  - 纯盘点行动只确认库存，不产生野外采集压力。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - 枯竭压力
  - 资源刷新
  - 采集收益
  - 采集规则
- id: rule:golden-light-accounting
  name: 金光记账与过载边界
  category: resource
  scope: player
  statement: 金光有“当日剩余额度”和“历史累计灌入”两种记账口径。当日剩余额度睡眠后通常恢复到100%且不累积；任何超过100%的数字必须明确写为历史累计、长期灌入、目标累计吸收或高风险过载事件，不能当作当前可随意支配的日额度。高强度灌入必须带来可保存的代价、痕迹或进度钟压力。
  examples:
  - 夏娃累计吸收很多金光可以作为历史累计，但主角当日金光余量仍按存档记录单独计算。
  - 单日普通行动不能无解释消耗或获得超过100%金光。
  - 强行过载催生魔力植物时，应检查土壤肥力、森林注意、主角疲劳和目标失控风险。
  exceptions:
  - 旧存档中的超百数值保留为历史事实，但后续回复必须解释为累计或异常事件。
  - 若玩家明确触发献祭、仪式、外部能源或剧情级异常，才允许临时突破日额度，并必须保存风险。
  source: system/world_rules
  locked: true
  aliases:
  - 今日金光
  - 金光累计
  - 金光记账
  - 金光过载
- id: rule:golden-light-daily
  name: 金光每日恢复但不累积
  category: resource
  scope: player
  statement: 金光睡眠后恢复到每日上限，不能跨天累积；当日用尽后必须等次日恢复。
  examples:
  - 第12天七次许愿后金光为0%。
  - 睡过夜后次日恢复到100%。
  source: archive_v1/state.md
  locked: true
  aliases:
  - 金光恢复
- id: rule:inventory-reliability
  name: 库存可信度与模糊库存
  category: inventory
  scope: play
  statement: 旧存档数量可以作为最后记录值，但不自动等于当前实时可靠库存；系统允许精确库存和模糊库存并存，未知数量不得硬编，也不得改成0。高风险或陈旧库存使用前必须提示盘点、冒险使用或改用可靠库存。
  examples:
  - 刚制作并保存的80支愈疮木重箭杆可作为精确可靠历史事实。
  - 旧记录9支涂毒箭应显示为旧记录，毒性和可用性需使用前检查。
  - 普通耗材可以记录为少量、够用、充足或未知，不必每次精确到个位。
  - 玩家说“我盘点一下毒箭”时，可推进少量时间并把结果保存成新的可靠库存。
  exceptions:
  - 唯一装备、当前装备栏和本回合刚获得/刚消耗并保存的物品可以按精确数处理。
  - 战斗、毒剂、火药、药剂和特殊弹药涉及高风险时，不能只用模糊描述完成扣减，必须说明可靠性或保存盘点结果。
  source: system/GM_PROTOCOL.md
  locked: true
  aliases:
  - 库存可信度
  - 旧记录库存
  - 模糊库存
  - 盘点规则
  - 精确库存
- id: rule:magic-plant-regrowth
  name: 魔力植物采收与再生
  category: ecology
  scope: world
  statement: 魔力植物可提供强效果材料，但必须有采收强度、植株健康、再生周期和生态痕迹。小量可持续采收通常只给少量产出；重采、连采或取核心部位会进入冷却、降低健康、产生污染/气味/魔力痕迹，并可能推动森林注意或土壤肥力消耗。已实测效果不等于对所有目标稳定满效。
  examples:
  - 渊刺藤四种刺效果已实测，但每次大批采刺都要考虑再生和混放风险。
  - 见血封喉取毒前必须先确认位置、植株状态、容器和防护；有效期未知时不能默认稳定。
  - 爆裂、霜冻、强毒等效果对不同体型、结构和抗性的目标应保守结算。
  exceptions:
  - 旧存档已确认的成品可作为历史事实保留，但后续补货必须走再生/采收规则。
  - 低风险普通作物不适用本规则，按农田成熟度和水土状态处理。
  source: system/world_rules
  locked: true
  aliases:
  - 渊刺藤再生
  - 见血封喉取毒
  - 采收冷却
  - 魔力植物再生
- id: rule:material-provenance-quality
  name: 材料来源与品质
  category: material
  scope: play
  statement: 重要材料必须记录来源、品质、数量可信度、处理状态和风险标签。普通材料可以模糊计量；火药、毒剂、魔力植物核心部位、稀有矿物和高性能工艺材料必须更精确。未确认材料不能直接等同于最优材料。
  examples:
  - “少量燧石”可以用于打火，但制作精密刃具前需要筛选品质。
  - 旧毒箭数量可保留，但毒性和有效期使用前需复核。
  - 月蛛藤丝这类高阶材料未确认前只能作为线索或小样，不直接批量进入库存。
  exceptions:
  - 低价值、随处可得、用途普通的材料可用“少量/够用/充足”表示。
  - 刚采集、刚盘点并保存的材料可以临时视为可靠库存。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - 品质等级
  - 材料可信度
  - 材料品质
  - 材料来源
- id: rule:monster-tier
  name: 魔物等级 E 到 S
  category: ecology
  scope: world
  statement: 魔物等级按 E/D/C/B/A/S 分级；普通动物不套用魔物等级，智慧种族不预设为魔物。
  examples:
  - 普通小史莱姆可为E级。
  - 灰藓族是智慧种族，不按魔物威胁分级。
  source: archive_v1/setting.md
  locked: true
  aliases:
  - 魔物分级
- id: rule:mycelium-capacity
  name: 夏娃与菌丝城容量边界
  category: ecology
  scope: base
  statement: 夏娃和菌丝城是强力基地系统，但不是无限自动化。菌丝扩张、房间增建、单位孵化、远程侦察和外派作战都受水分、养分、核心成熟度、通道维护、通信距离和暴露风险约束。超出当前容量的行动必须降低效率、延长成熟时间、消耗资源或推动土壤肥力/森林注意/社会警惕等反馈。
  examples:
  - 新增侧室、长隧道或大批单位时，应说明耗时、养分来源和维护需求。
  - 外派锐孢蕈越远，通信和支援越不稳定，不能让夏娃全地图即时感知。
  - 菌丝城能协助灌溉和后勤，但不能凭空创造水、食物或金属。
  exceptions:
  - 基地内部已建立的短距离通道和例行厨房/仓储可简化处理。
  - 玩家只是查询夏娃汇报时，不推进时间也不消耗额外资源。
  source: system/world_rules
  locked: true
  aliases:
  - 夏娃能力边界
  - 幽壤菌裔上限
  - 菌丝城容量
  - 菌丝扩张代价
- id: rule:player-agency
  name: 玩家只操控自己
  category: gm
  scope: play
  statement: GM 描述世界反应、NPC、环境和结果，但不能擅自替玩家决定行动、情绪或下一步路线。
  examples:
  - 可以说野兽退后观察你。
  - 不能说你自动回家睡觉，除非玩家选择。
  source: content_spec
  locked: true
  aliases:
  - 玩家操控边界
- id: rule:progress-clock-use
  name: 进度钟使用原则
  category: clock
  scope: play
  statement: 长期目标、持续风险、势力态度、基地压力、疲劳和制作突破应优先用进度钟表示，而不是一回合直接完成或直接爆发。每次 tick 都必须有触发原因；满钟后产生可保存后果或新节点，而不是只改变气氛。
  examples:
  - 灰藓族信任通过履约、交换和共同项目逐步增加。
  - 森林注意因大规模金光、爆炸或血腥痕迹推进。
  - 一个复杂工艺先做原型，再测试，再固化为稳定配方。
  exceptions:
  - 简单一次性行动不需要创建进度钟。
  - 已有更具体的项目实体时，进度钟只记录压力或阶段，不替代项目内容。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - 倒计时
  - 进度钟规则
  - 长期项目
  - 风险钟
- id: rule:route-and-time-cost
  name: 路线与时间成本
  category: travel
  scope: play
  statement: 移动必须优先使用已知路线、地点距离和当前时段。未知路线不能直接瞬移到目标；需要先通过线索、侦查、地形判断或向 NPC 询问建立可行路径。远行会消耗时段，并可能影响疲劳、天气、基地维护和遭遇距离。
  examples:
  - 从基地到 L9 巨树地下居所可使用既有路线，但入夜或负重会提高风险。
  - L15 草原边界之后的外部世界不能凭想象立即抵达城市，必须先建立路标和补给点。
  - 被雨水、雾气、伤势或携带俘虏影响时，原路线时间应上调。
  exceptions:
  - 基地内相邻房间、围栏内短距离移动可忽略分钟级成本。
  - 已由存档明确建立的菌丝内部通道可按基地内部移动处理。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - 旅行时间
  - 路线成本
  - 远行规则
- id: rule:trade-leakage-control
  name: 贸易与技术外泄
  category: economy
  scope: play
  statement: 贸易按物资价值、可解释性、规模、可追踪性和技术敏感度分级。食物、盐、普通纤维和低阶工具风险较低；火药、高性能弩、魔力植物种子、菌丝造物和大量异常物资会推进传闻或引来势力兴趣。灰藓族中介可以降低但不能消除外泄。
  examples:
  - 少量盐和调料可作为礼物，不必立刻引来外部文明。
  - 大量火药武器或重复出现的异常作物会增加文明传闻。
  - 交易时展示成品通常比展示工艺细节更安全。
  exceptions:
  - 已在封闭家庭内部的小规模互助可低风险处理。
  - 玩家主动公开技术时，应明确推进外泄后果。
  source: gameplay_patch_2026-06-30
  locked: true
  aliases:
  - 交换规模
  - 传闻风险
  - 技术外泄规则
  - 贸易风险
- id: rule:water-budget
  name: 干旱期水资源账
  category: resource
  scope: base
  statement: 干旱期水资源用档位管理，而不是默认无限。水源、储水、农田、菌丝城、厨房、发酵、俘虏/动物和旅行饮水共同决定水压状态：充裕、稳定、紧张、危急、未知。L7泉眼和菌丝抽水可以缓解干旱，但不能完全绕开水源承载、通道维护和生态暴露。
  examples:
  - 27畦农田加菌丝城自给时，应至少检查水压是否从稳定转为紧张。
  - 连续晴天、扩田、发酵和大量单位孵化会提高水压或推动春末干旱钟。
  - 建水渠、蓄水池、覆盖物、轮灌或雨水收集可以降低水压。
  exceptions:
  - 少量饮水和日常厨房用水可并入例行消耗，不必每次精算。
  - 下雨、露水充足或新水源确认后，可以临时降低水压。
  source: system/world_rules
  locked: true
  aliases:
  - 干旱水压
  - 水账
  - 水资源
  - 灌溉压力
- id: rule:relationship-delta-boundary
  name: 关系变化保存边界
  category: relationship
  scope: play
  statement: 关系内容应区分互动入口、态度、承诺、信任阶段和实际状态。查询关系只提供已知事实、可选开场和边界；实际长谈、喂养、搬迁、承诺、冲突或信任阶段变化必须通过行动结算并保存delta。一次友好或误会不能自动代表永久关系改变。
  examples:
  - 与An闲聊可以召回H室边界和分工贸易，但新承诺必须保存。
  - T2安静进食只说明本次应激降低，不能自动写成已驯服。
  - 南瓜状态检查可以形成观察记录，但新能力需要明确测试和保存。
  exceptions:
  - 纯称呼、礼貌问候和无后果寒暄不需要单独保存。
  - 用户明确要求修订人物设定时，应作为剧情包维护或存档内容delta处理。
  source: campaign_author_polish_2026-07-01
  locked: true
  aliases:
  - 关系保存
  - 社交delta
  - 信任阶段
  - 互动边界
- id: rule:palette-candidate-deployment
  name: 素材池投放边界
  category: authoring
  scope: play
  statement: palette候选是可投放素材，不是已发生事实。GM使用候选时必须先检查地点、意图、解锁条件、发现方式、风险和save_as边界；未确认候选只能作为线索、假说或hinted实体。高价值资源、外部势力、遗迹和新物种至少需要行动确认后才能成为权威存档事实。
  examples:
  - 远烟可以先作为线索，不直接确认外部人类已接近基地。
  - 松脂块可通过采集行动转为材料，且要记录气味和火源风险。
  - 草原痕迹制造者只有在多线索支撑后才保存为势力。
  exceptions:
  - 低风险普通材料可由一次明确采集行动保存为少量样本。
  - 用户明确批准新增设定时，可直接写入剧情包内容源。
  source: campaign_author_polish_2026-07-01
  locked: true
  aliases:
  - palette投放
  - 素材池边界
  - 候选实体
  - 随机素材确认
