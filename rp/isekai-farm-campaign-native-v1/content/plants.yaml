  aliases:
  - 见血封喉
  - 见血封喉（箭毒木）
  details:
    plant_profile:
      toxin_profile: 白色乳汁可作箭毒；有效期、衰减和污染风险需要行动确认。
      handling_risks:
      - 高毒误触、误食或误伤友方
      - 污染工具、食物或储物区
      - 旧毒箭有效期未知，不能默认稳定
      save_boundary: 可靠位置、树体恢复、采样量和毒剂库存属于存档行动结果。
