- id: world:divinity
  name: 神祇与现实显现
  category: power
  scope: world
  visibility: known
  priority: 78
  summary: 神祇客观存在，但直接降临现实、稳定化身或明确干预需要苛刻条件；日常信仰、神术与神祇亲自显现必须区分。
  content:
    confirmed:
    - 神祇真实存在。
    - 不同文化可以形成不同宗教、神学和解释传统。
    manifestation:
      baseline: 直接现实显现极少见且不能被日常稳定调用
      interpretation: 神术、异象、预兆和巧合不能自动证明神祇亲自出现
      possible_requirements:
      - 与神职领域相符的地点或时机
      - 长期信仰、契约或仪式锚点
      - 稀有媒介、重大代价或不可逆后果
    unresolved:
    - 神系结构与神祇数量
    - 神术的普及程度
    - 各文化是否崇拜同一批神祇
  linked_rules:
  - rule:divine-manifestation-limits
  applies_when:
    keywords:
    - 神祇
    - 神明
    - 宗教
    - 神术
    - 神迹
    - 祈祷
    submodes:
    - social
  source: user_confirmation_2026-06-29
  aliases:
  - 宗教与神祇
  - 神明
  - 神祇
  - 神迹
