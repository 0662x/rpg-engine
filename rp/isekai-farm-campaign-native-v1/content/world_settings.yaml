- id: world:play-loop
  name: 游玩闭环
  category: truth
  scope: play
  visibility: known
  priority: 92
  summary: 本剧情包按“查询事实、预览行动、校验 delta、保存结果、再次进入上下文”的闭环游玩；未保存叙事不能变成权威事实。
  content:
    player_experience:
    - 玩家应感觉每次行动都有选择、代价和可追踪后果。
    - 系统不追求重数值模拟，而追求结构化、可验证、可继续的叙事。
    principles:
    - 查询只召回信息和可选行动，不推进时间。
    - 预览行动必须说明事实依据、风险、时间成本、可能 delta 和不确定点。
    - 保存后的 delta 才会改变存档事实、进度钟、实体和事件日志。
    - AI 可以辅助判断，但不能跳过校验和存档边界。
  linked_rules:
  - rule:ai-gm-turn-loop
  - rule:progress-clock-use
  - rule:consequence-ladder
  linked_clocks:
  - clock:fatigue-strain
  - clock:base-upkeep-pressure
  applies_when:
    keywords:
    - 怎么玩
    - 回合
    - 预览
    - 保存
    - delta
    submodes:
    - query
    - explore
    - social
    - craft
  source: gameplay_patch_2026-06-30
  aliases:
  - AI GM流程
  - 回合流程
  - 游戏闭环
