- id: world:exploration-procedure
  name: 探索与线索程序
  category: truth
  scope: play
  visibility: known
  priority: 88
  summary: 探索以地点节点、路线成本、压力结果和多线索确认驱动；未知事实必须通过可行动线索逐步确认。
  content:
    clue_policy:
    - 单线索形成假说。
    - 双线索指向调查方向。
    - 三个互相支持的线索才适合确认重大事实。
    exploration_outputs:
    - 到达或未到达
    - 新线索
