- id: world:faction-contact-play
  name: 势力接触与贸易玩法
  category: faction
  scope: play
  visibility: known
  priority: 82
  summary: 势力玩法以姿态、信任、警惕、承诺、礼物、交易规模和技术外泄为核心；个体友好不等于整个族群或外部文明友好。
  content:
    contact_checks:
    - 对方是谁：个体、家庭、聚落、族群或外部势力
    - 玩家姿态：低压、礼物、中介、武装、威胁、潜入
    - 携带物：食物、盐、工具、火药、武器、异常材料
    - 历史：承诺是否履行、是否取走资源、是否制造噪音
    - 当前钟：灰藓族互信、湖边警惕、文明传闻
    trade_policy:
    - 低风险礼物用于建立关系。
    - 高价值物资会要求解释来源或推进外泄风险。
    - 工艺细节比单件成品更敏感。
  linked_rules:
  - rule:faction-contact-stance
  - rule:trade-leakage-control
  - rule:external-trace-classification
  - rule:consequence-ladder
  linked_clocks:
  - clock:ashmoss-trust
  - clock:lake-settlement-suspicion
  - clock:civilization-rumor
  linked_entities:
  - char:an
  - species:ashmoss-folk
  - loc:lake-ashmoss-settlement
  applies_when:
