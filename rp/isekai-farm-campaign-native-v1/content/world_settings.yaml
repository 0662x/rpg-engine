- id: world:crafting-material-loop
  name: 制作与材料循环
  category: technology
  scope: play
  visibility: known
  priority: 84
  summary: 制作按材料来源、品质、工具、原型、测试和稳定配方推进；材料既可以精确计量，也可以按可信度模糊管理。
  content:
    craft_stages:
    - 想法
    - 材料确认
    - 小样/原型
    - 测试
    - 稳定配方
    - 批量生产
    material_axes:
    - 来源：采集、种植、交易、拆解、实验产物
    - 品质：普通、可用、优质、异常、危险、不可靠
    - 状态：新鲜、干燥、发酵中、失效风险、已加工
    - 可信度：刚盘点、旧记录、估算、未知
