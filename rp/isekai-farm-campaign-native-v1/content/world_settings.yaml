- id: world:technology
  name: 科技与制作层级
  category: technology
  scope: world
  visibility: known
  priority: 75
  summary: 外部文明总体处于早期近代，物理、魔法和混合技术并行且地区发展不均；制作仍按材料、工具、场地、时间和风险结算。
