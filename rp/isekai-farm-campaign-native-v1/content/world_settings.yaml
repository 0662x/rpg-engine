world_settings:
- id: world:ancient-legacies
  name: 古代文明与遗迹
  category: truth
  scope: world
  visibility: hinted
  priority: 72
  summary: 世界存在古代文明遗迹；遗迹是高危险、失落知识、异常生态和物理/魔法混合技术的重要来源，但具体文明、年代与地点尚未确认。
  content:
    confirmed:
    - 古代文明遗迹客观存在于世界各地。
    - 遗迹可能保存物理、魔法或混合技术成果。
    principles:
    - 遗迹不是免费宝库，探索、识别、修复和带走成果都有风险与代价。
    - 不预设所有遗迹来自同一个万能古代帝国。
    - 家园附近是否存在具体遗迹必须通过线索和探索确认。
    unresolved:
    - 古代文明的数量、种族和年代
    - 文明衰亡原因
    - 遗迹与死亡森林异常的关系
  linked_rules:
  - rule:external-trace-classification
  linked_clocks:
  - clock:forest-attention
  - clock:civilization-rumor
  applies_when:
    keywords:
    - 古代文明
    - 遗迹
    - 废墟
    - 失落技术
    - 古代遗物
    submodes:
    - travel
    - gather
  source: user_confirmation_2026-06-29
  aliases:
  - 古代文明
  - 古代遗迹
  - 失落文明
  - 遗迹
- id: world:base-upkeep
  name: 基地经营与维护
  category: ecology
  scope: base
  visibility: known
  priority: 86
  summary: 基地经营围绕农田、水、土壤、菌丝城、仓储、厨房、危险品和防御维护展开；维护压力用进度钟而不是一次性灾难处理。
  content:
    maintenance_style:
    - 先提示小问题，再推进压力钟。
    - 玩家安排明确分工后可降低频率。
    - 长期忽略才转化为污染、损耗、误触发或效率下降。
    upkeep_domains:
    - 农田浇水、堆肥、轮作和采收
    - 菌丝城水分、养分、通道和单位分工
    - 食物、发酵物、盐、调料和储粮
    - 火药、毒剂、弹药和陷阱分区
    - 围栏、门、绳梯、鱼笼和基地路径
  linked_rules:
  - rule:base-upkeep-loop
  - rule:water-budget
  - rule:mycelium-capacity
  - rule:inventory-reliability
  linked_clocks:
  - clock:base-upkeep-pressure
  - clock:drought-spring
  - clock:soil-depletion
  linked_entities:
  - loc:home-clearing
  - loc:home-mycelium-house
  applies_when:
    keywords:
    - 基地
    - 农田
    - 仓储
    - 厨房
    - 发酵
    - 陷阱
    - 维护
    submodes:
    - query
    - rest
    - craft
    - gather
  source: gameplay_patch_2026-06-30
  aliases:
  - 农家经营
  - 后勤设定
  - 基地维护设定
  - 家园
