  category: faction
  scope: world
  visibility: known
  priority: 70
  summary: 势力表示组织目标、资源、态度和行动边界；不能把种族整体态度等同于某个势力态度。
  content:
    principles:
    - An一家、湖边聚落和外部人类文明应分别处理。
    - 正式接触、敌意、贸易和警惕必须通过事件或进度钟推进。
