entities:
- id: item:burst-thorn-bolts
  type: item
  name: 赤红炸箭
  visibility: known
  summary: 撞击爆裂箭；拳大空腔爆裂，适合冲击、破甲和驱散。
  aliases:
  - 炸箭
  - 爆裂箭
  - 赤红炸箭
  item:
    category: ammunition
    quantity: 20.0
    unit: 支
    stackable: true
    properties:
      ammo_profile:
        adjudication_rules:
        - 每次击发消耗1支赤红炸箭。
        - 命中硬目标时优先结算破甲/震退。
        - 若用于狩猎，战利品完整度应下降。
        best_use: 硬壳、甲壳、群体驱散、打断冲锋
        compatible_weapon_id: item:ultimate-compound-crossbow
        effect_type: impact_burst
        limitations:
        - 不是火药爆炸，范围小于火药箭。
        - 可能破坏皮毛、甲壳和可采集材料。
        primary_effect: 撞击爆裂、冲击、破甲或撕裂表层组织
        range_notes: 中距和远距都可用；需命中实体表面触发
        reliability: 撞击触发稳定；软泥/水面/厚毛皮会削弱爆裂形态
        risks:
        - 近距可能有碎片和冲击波风险。
        - 对隐蔽行动不友好，声音和痕迹明显。
- id: item:frost-thorn-bolts
  type: item
  name: 霜白冻箭
  visibility: known
  summary: 霜寒控场箭；拳大范围冻伤，适合减速、冻结湿表面和压制冷血目标。
  aliases:
  - 冰箭
  - 冻箭
  - 霜白冻箭
  item:
    category: ammunition
    quantity: 20.0
    unit: 支
    stackable: true
    properties:
      ammo_profile:
        adjudication_rules:
        - 每次击发消耗1支霜白冻箭。
        - 命中后记录目标减速、冻结或地形变化。
        - 水/胶质/潮湿环境可给控场效果加成。
        best_use: 冷血目标、胶质目标、水边战斗、控场撤退
        compatible_weapon_id: item:ultimate-compound-crossbow
        effect_type: frost_control
        limitations:
        - 不是大范围冰墙。
        - 对厚甲或高热目标更偏减速而非冻结。
        primary_effect: 局部冻结、冻伤、减速或制造湿滑/脆化表面
        range_notes: 命中点附近生效；远距命中仍可控场但范围不扩大
        reliability: 潮湿、水面、胶质目标上效果更明显；高热目标会削弱
        risks:
        - 可能冻裂可采集材料。
        - 水边使用会改变地面风险，友方也可能滑倒。
