- id: ref:campaign-authoring-patterns
  type: reference
  name: 作者版沙盒内容组织参考
  visibility: known
  summary: 本剧情包采用“准备情境、不预设剧情；三线索确认；进度钟；关系结算边界；地区化随机表”的组织原则，并限制在当前引擎支持的实体、规则、时钟、随机表和palette内表达。
  aliases:
  - 作者版内容组织
  - 沙盒剧情组织
  - 剧情包精修参考
  details:
    borrowed_patterns:
    - pattern: prep_situations_not_plots
      use_in_campaign: 只准备地点、压力、目标、线索和可行动钩子，不预写玩家必须经历的事件顺序。
    - pattern: three_clue_redundancy
      use_in_campaign: 重大真相用地点复查、人物询问、材料实验等多入口线索确认。
    - pattern: progress_and_faction_clocks
      use_in_campaign: 势力态度、森林注意、遗迹扰动、基地维护和制作突破都用clock推进。
    - pattern: relationship_status_axes
      use_in_campaign: 剧情包只写关系结算边界和保存触发；具体关系对象、姿态、信任和承诺属于存档。
    - pattern: regional_random_tables
      use_in_campaign: 随机结果必须贴合地区、时段、风险和当前进度钟，优先生成可行动线索或小代价。
    source_urls:
    - https://thealexandrian.net/wordpress/53341/roleplaying-games/is-node-based-design-prepping-a-plot
    - https://thealexandrian.net/wordpress/7985/roleplaying-games/node-based-scenario-design-part-3-inverting-the-three-clue-rule
    - https://bladesinthedark.com/progress-clocks
    - https://bladesinthedark.com/faction-game
    - https://www.dungeonworldsrd.com/gamemastering/fronts/
    - https://www.roleplayingtips.com/rptn/random-encounter-tables/
