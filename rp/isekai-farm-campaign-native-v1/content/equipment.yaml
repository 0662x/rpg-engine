        - 射击必须消耗1支对应弹药，除非明确叙述为未击发/取消。
        - 火药箭、赤红炸箭和霜白冻箭需要先确认波及范围。
        - 若目标进入5步内，优先处理近身威胁，再考虑弩。
        range_bands:
        - band: 贴身
          distance: 0-5步
          risk: 装填和瞄准容易被打断
          use: 不推荐；优先退开、换盾/短刀/长矛
        - band: 近距
          distance: 5-15步
          risk: 过穿/爆炸波及/无时间重装
          use: 可急射大型目标或已控目标
        - band: 标准
          distance: 15-70步
          risk: 目标高速横移或遮蔽会降低命中
          use: 最稳定射击区间；适合瞄准弱点
        - band: 远距
          distance: 70-110步
          risk: 风、下坠和目标移动影响明显
          use: 需要稳定姿势、清晰目标和足够瞄准时间
        - band: 极限
          distance: 110步以上
          risk: 命中和具体伤害必须保守结算
          use: 只建议压制、大型目标或剧情性远射
        ready_state: 默认未声明已上弦；战斗前必须确认是否已上弦/已装箭
        risks:
        - 火药/爆炸弹药会暴露基地附近活动痕迹。
        - 疲劳状态下长时间瞄准和重装会放大失误风险。
