        - 过度依赖远程击杀可能损毁可采集材料或惊动其他威胁。
        role: 远程高威力精确武器；适合先手、伏击、控场和单发高价值目标
        wet_weather: 弩本体可用；火药箭潮湿时可靠性下降，需防水封存或重新检查引信
