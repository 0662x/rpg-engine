- id: creature:v1-31e9c69edd
  type: species
  name: 核心（核）解剖数据
  visibility: known
  summary: 来源： 酸史莱姆（D 级·中型）S1 活体摘取 外观： 拇指大，淡绿色，表面细木纹状脉络 质地： 骨质感（≈ 鸟骨硬度），可研磨出浅绿色粉末 发光： 活体内周期性闪烁；离体瞬间熄灭 → 不再发光 推测：发光依赖活体胶质供能
    连接： 核心通过数十根蠕动胶质纤维与身体各处相连 每根纤维断开时核心乱闪、身体收缩（有明显的神经/魔力传导） 离体后变化： 颜色未变，无味，口感微苦涩 无温度、无自主运动、无魔力波动（目测） 残胶变化： 核心离体后胶质缓慢液化（约 5–10min）
    液化后无色透明、无酸、微粘 干后形成透明防水膜 ✅（可作防水涂层） 推测： 核心是魔物的魔力器官 & 胶质结构维持器 胶质的酸性由核心调控——核心离体酸性消失 残胶可作天然防水胶/木材涂层 保存状态： 核心：干燥阔叶包裹，常温 残胶：竹杯密封，约
    30ml
  aliases:
  - 核心（核）解剖数据
