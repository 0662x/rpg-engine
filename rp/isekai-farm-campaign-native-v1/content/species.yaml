- id: creature:slime-acid-medium
  type: species
  name: 史莱姆（中型·酸）
  visibility: known
  summary: 分类： 魔物（胶质生命体·酸性亚种） 魔物等级： D（需谨慎） 体型： 西瓜大（约 25–30cm 直径） 外观： 淡黄绿半透明凝胶，内部拇指大淡绿核心 核心闪烁频率 ≈ 心跳（约 1.2Hz），紧张时加速 特性： 分泌弱酸性消化液——可缓慢溶解木质、焦化枯叶
    接触产生轻微化学热（≈ 体感微温） 对干燥沙土明显回避（无法越过沙土隔离带） 感知方式： 推测感知震动和热量（无视觉/听觉） 踩断枯枝后暂停并转向声源方向 不主动追击，感知后短暂停顿即恢复进食 食性： 活木 + 腐叶为主（比普通史莱姆食性更广）
    颜色变化： 安静时淡黄绿，紧张/受刺激时转深芥末黄 捕获方法： 蜡质阔叶铲起 + 枯枝夹子（不可直接用手） 隔离：沙土圈有效 首次目击： 第5天入夜，空地以西 ~500m 威胁评级： 🟡 需谨慎（酸液可灼伤皮肤，不致死但疼）
  aliases:
  - F3
  - 史莱姆（中型·酸）
