cases:
  - id: consensus_rest_validates_and_commits
    text: 休息到早上
    runtime:
      intent_ai: consensus
      external_intent_candidate:
        kind: single
        mode: action
        action: rest
        slots:
          until: morning
        plan: []
        confidence: high
        missing_slots: []
        needs_confirmation: []
        safety_flags: []
        reason: 外部 AI 判断这是 rest。
    fake_internal_review:
      kind: single
      mode: action
      action: rest
      slots:
        until: morning
      plan: []
      confidence: high
      missing_slots: []
      needs_confirmation: []
      safety_flags: []
      reason: 内部 AI 同意这是 rest。
      agreement_with_external: agree
      disagreements: []
      external_candidate_quality: usable
    preview:
      status: ready
      ready_to_save: true
      action: rest
      selected_source: ai_consensus
    validate:
      ok: true
    commit:
      attempted: true
      ok: true
      state_changed: true
      state:
        current_turn_id: turn:000001

