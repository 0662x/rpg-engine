    steps:
      - id: initial_clarification
        text: 守夜到天亮
        runtime:
          intent_ai: consensus
          external_intent_candidate:
            kind: single
            mode: action
            action: rest
            slots:
              until: morning
            plan: []
            confidence: high
            missing_slots: []
            needs_confirmation: []
            safety_flags: []
            reason: 外部 AI 判断这是休息行动。
        fake_internal_review:
          kind: single
          mode: action
          action: routine
          slots:
            task: 整理背包
          plan: []
          confidence: high
          missing_slots: []
          needs_confirmation: []
          safety_flags: []
          reason: 内部 AI 错误地判断为 routine。
          agreement_with_external: disagree
          disagreements: [action mismatch]
          external_candidate_quality: wrong_action
        start:
          mode: action
          submode: routine
          requires_preview: true
          can_proceed: false
          intent_kind: unresolved
          intent_action: null
          intent_status: needs_confirmation
          clarification_reason: external_internal_action_mismatch
          context_clarification_reason: external_internal_action_mismatch
        preview:
          action: act
          status: needs_confirmation
          ready_to_save: false
          recommended_next_tool: ask_clarification
          clarification_reason: external_internal_action_mismatch
          clarification_choice_count: 2
          clarification_question_contains: [哪类行动]
          plan: []
          selected_outcome:
            source: ai_disagreement
            mode: action
            submode: routine
            action: null
      - id: player_answer_fresh_candidate
        text: 我是想休息到天亮
        runtime:
          intent_ai: consensus
          external_intent_candidate:
            kind: single
            mode: action
            action: rest
            slots:
              until: 天亮
            plan: []
            confidence: high
            missing_slots: []
            needs_confirmation: []
            safety_flags: []
            reason: 玩家澄清后，外部 AI 重新生成完整 rest candidate。
        fake_internal_review:
          kind: single
          mode: action
          action: rest
          slots:
            until: 天亮
          plan: []
          confidence: high
          missing_slots: []
          needs_confirmation: []
          safety_flags: []
          reason: 玩家明确要休息到天亮。
          agreement_with_external: agree
          disagreements: []
          external_candidate_quality: usable
